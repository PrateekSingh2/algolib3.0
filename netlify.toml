# ─────────────────────────────────────────────────────────────────────────────
# PRODUCTION BUILD
# ─────────────────────────────────────────────────────────────────────────────
[build]
  command   = "npm run build"
  publish   = "dist"   # Vite outputs here

# ─────────────────────────────────────────────────────────────────────────────
# NETLIFY FUNCTIONS
# ─────────────────────────────────────────────────────────────────────────────
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions.realTimeVisualizer]
  timeout = 60

# ─────────────────────────────────────────────────────────────────────────────
# LOCAL DEV  (used by `netlify dev`)
#
# CRITICAL: host must be "127.0.0.1" (explicit IPv4).
#   If omitted or set to "localhost", Node.js on Windows/macOS resolves it to
#   ::1 (IPv6). The Vite process binds only to 127.0.0.1 (IPv4), so the
#   TCP connection from the Netlify proxy to Vite crosses address families and
#   produces ECONNRESET. Pinning both sides to the same IPv4 loopback address
#   eliminates the conflict entirely.
#
# autoLaunch = false prevents the CLI from calling `open http://localhost:8888`
#   in your default browser, which would again hit the IPv6 socket. Always
#   open http://127.0.0.1:8888 manually (see README for the exact procedure).
# ─────────────────────────────────────────────────────────────────────────────
[dev]
  framework    = "#custom"
  command      = "npm run dev"   # Vite dev server (binds to 127.0.0.1:8080)
  targetPort   = 8080            # Port Netlify proxy forwards HTTP to
  port         = 8888            # Port the browser hits
  host         = "127.0.0.1"     # Strict IPv4 – prevents ::1 / 127.0.0.1 mismatch
  autoLaunch   = false           # Never open browser via 'localhost' alias

# ─────────────────────────────────────────────────────────────────────────────
# RESPONSE HEADERS
# ─────────────────────────────────────────────────────────────────────────────

# ── Security headers for ALL routes ──────────────────────────────────────────
# NOTE: Cross-Origin-Opener-Policy is intentionally OMITTED.
# Firebase signInWithPopup opens a relay at *.firebaseapp.com/__/auth/handler
# which must postMessage back to window.opener to complete auth. Any COOP value
# (even same-origin-allow-popups) can sever this cross-origin browsing context
# link and silently kill the login callback. The 5 remaining headers are
# sufficient for a strong Lighthouse Best Practices score.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection      = "1; mode=block"
    Referrer-Policy       = "strict-origin-when-cross-origin"
    Permissions-Policy    = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://*.firebaseapp.com https://*.firebaseio.com https://*.firebasedatabase.app https://*.googleapis.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://unpkg.com http://localhost:* http://127.0.0.1:*; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://unpkg.com; font-src 'self' https://fonts.gstatic.com data: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://unpkg.com; img-src 'self' data: blob: https: http:; media-src 'self' https: blob: data:; connect-src 'self' https://*.hf.space https://apis.google.com https://*.supabase.co https://*.firebaseio.com https://*.firebasedatabase.app https://*.googleapis.com https://securetoken.googleapis.com https://identitytoolkit.googleapis.com https://api.iconify.design https://iconify.design wss://*.firebaseio.com wss://*.firebasedatabase.app https://ik.imagekit.io https://us-central1-algolib-bf40f.cloudfunctions.net https://gist.githubusercontent.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://unpkg.com ws://localhost:* ws://127.0.0.1:* http://localhost:* http://127.0.0.1:*; frame-src 'self' https://*.firebaseapp.com https://www.youtube.com https://pythontutor.com https://godbolt.org; worker-src 'self' blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://unpkg.com; manifest-src 'self';"


# Prevent the browser from caching the SW registration script so that a
# freshly-deployed SW is picked up immediately on the next page load.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Same treatment for the Workbox-generated SW file produced by vite-plugin-pwa
[[headers]]
  for = "/workbox-*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Explicit MIME type for robots.txt so Lighthouse can parse it correctly.
# Cache for 1 hour only (crawlers check frequently).
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type  = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

# ─────────────────────────────────────────────────────────────────────────────
# REDIRECTS
# ─────────────────────────────────────────────────────────────────────────────

# CRITICAL SEO FIX: Static files must be served directly, NOT intercepted by
# the SPA catch-all redirect below. These must come FIRST (Netlify processes
# redirects in order and stops at the first match).
[[redirects]]
  from   = "/robots.txt"
  to     = "/robots.txt"
  status = 200
  force  = true

[[redirects]]
  from   = "/sitemap.xml"
  to     = "/sitemap.xml"
  status = 200
  force  = true

# React Router SPA fallback – serves index.html for every non-asset route so
# that client-side navigation works after a hard refresh in production.
# MUST be LAST — it's a catch-all wildcard.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200