[build]
  command = "npm run build"
  publish = "dist" # Vite outputs files here

[dev]
  framework = "#custom"
  command = "npm run dev"
  targetPort = 8080
  port = 8888
  host = "127.0.0.1"

# React Router SPA Fallback (Prevents 404s on page refresh in production)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
