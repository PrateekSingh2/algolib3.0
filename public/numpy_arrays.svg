<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- Definitions -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="grad1D" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="grad2D" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="grad3D" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.5"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="16" fill="url(#bgGrad)" />
  <rect width="800" height="450" rx="16" fill="url(#grid)" />

  <!-- Title -->
  <text x="400" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#f8fafc" text-anchor="middle" letter-spacing="1">NumPy Array Dimensions (Shape)</text>
  <text x="400" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Scalars, Vectors, Matrices, and Tensors</text>

  <!-- 1D Vector Section -->
  <g transform="translate(100, 150)">
    <rect x="-30" y="-30" width="180" height="120" rx="12" fill="url(#boxGrad)" stroke="#334155" stroke-width="1"/>
    <text x="60" y="-5" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#93c5fd" text-anchor="middle">1D Array (Vector)</text>
    <text x="60" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Shape: (4,)</text>
    
    <!-- Cells -->
    <g transform="translate(0, 15)">
      <rect x="0" y="0" width="30" height="30" rx="4" fill="url(#grad1D)" stroke="#60a5fa" stroke-width="1.5"/>
      <rect x="30" y="0" width="30" height="30" rx="4" fill="url(#grad1D)" stroke="#60a5fa" stroke-width="1.5"/>
      <rect x="60" y="0" width="30" height="30" rx="4" fill="url(#grad1D)" stroke="#60a5fa" stroke-width="1.5"/>
      <rect x="90" y="0" width="30" height="30" rx="4" fill="url(#grad1D)" stroke="#60a5fa" stroke-width="1.5"/>
      
      <text x="15" y="20" font-family="monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">1</text>
      <text x="45" y="20" font-family="monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">5</text>
      <text x="75" y="20" font-family="monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">9</text>
      <text x="105" y="20" font-family="monospace" font-size="12" fill="#e2e8f0" text-anchor="middle">2</text>
    </g>
  </g>

  <!-- 2D Matrix Section -->
  <g transform="translate(320, 150)">
    <rect x="-30" y="-30" width="180" height="180" rx="12" fill="url(#boxGrad)" stroke="#334155" stroke-width="1"/>
    <text x="60" y="-5" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#34d399" text-anchor="middle">2D Array (Matrix)</text>
    <text x="60" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Shape: (3, 4)</text>
    
    <!-- Cells Row 1 -->
    <g transform="translate(0, 15)">
      <rect x="0" y="0" width="30" height="30" rx="4" fill="url(#grad2D)" stroke="#34d399" stroke-width="1.5"/>
      <rect x="30" y="0" width="30" height="30" rx="4" fill="url(#grad2D)" stroke="#34d399" stroke-width="1.5"/>
      <rect x="60" y="0" width="30" height="30" rx="4" fill="url(#grad2D)" stroke="#34d399" stroke-width="1.5"/>
      <rect x="90" y="0" width="30" height="30" rx="4" fill="url(#grad2D)" stroke="#34d399" stroke-width="1.5"/>
    </g>
    <!-- Cells Row 2 -->
    <g transform="translate(0, 45)">
      <rect x="0" y="0" width="30" height="30" rx="4" fill="url(#grad2D)" stroke="#34d399" stroke-width="1.5"/>
      <rect x="30" y="0" width="30" height="30" rx="4" fill="url(#grad2D)" stroke="#34d399" stroke-width="1.5"/>
      <rect x="60" y="0" width="30" height="30" rx="4" fill="url(#grad2D)" stroke="#34d399" stroke-width="1.5"/>
      <rect x="90" y="0" width="30" height="30" stroke-width="1.5" rx="4" fill="url(#grad2D)" stroke="#34d399" />
    </g>
    <!-- Cells Row 3 -->
    <g transform="translate(0, 75)">
      <rect x="0" y="0" width="30" height="30" rx="4" fill="url(#grad2D)" stroke="#34d399" stroke-width="1.5"/>
      <rect x="30" y="0" width="30" height="30" rx="4" fill="url(#grad2D)" stroke="#34d399" stroke-width="1.5"/>
      <rect x="60" y="0" width="30" height="30" rx="4" fill="url(#grad2D)" stroke="#34d399" stroke-width="1.5"/>
      <rect x="90" y="0" width="30" height="30" rx="4" fill="url(#grad2D)" stroke="#34d399" stroke-width="1.5"/>
    </g>
  </g>

  <!-- 3D Tensor Section -->
  <g transform="translate(540, 150)">
    <rect x="-30" y="-30" width="180" height="230" rx="12" fill="url(#boxGrad)" stroke="#334155" stroke-width="1"/>
    <text x="60" y="-5" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#c4b5fd" text-anchor="middle">3D Array (Tensor)</text>
    <text x="60" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Shape: (3, 3, 4)</text>

    <!-- Layer 3 (Back) -->
    <g transform="translate(16, -16)">
      <g transform="translate(0, 45)"><rect x="0" y="0" width="120" height="90" rx="4" fill="url(#grad3D)" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="2 2" opacity="0.4"/></g>
    </g>
    
    <!-- Layer 2 (Middle) -->
    <g transform="translate(8, -8)">
      <g transform="translate(0, 45)"><rect x="0" y="0" width="120" height="90" rx="4" fill="url(#grad3D)" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/></g>
    </g>

    <!-- Layer 1 (Front) -->
    <g transform="translate(0, 45)">
      <!-- Row 1 -->
      <rect x="0" y="0" width="30" height="30" rx="4" fill="url(#grad3D)" stroke="#a78bfa" stroke-width="1.5"/>
      <rect x="30" y="0" width="30" height="30" rx="4" fill="url(#grad3D)" stroke="#a78bfa" stroke-width="1.5"/>
      <rect x="60" y="0" width="30" height="30" rx="4" fill="url(#grad3D)" stroke="#a78bfa" stroke-width="1.5"/>
      <rect x="90" y="0" width="30" height="30" rx="4" fill="url(#grad3D)" stroke="#a78bfa" stroke-width="1.5"/>
      <!-- Row 2 -->
      <rect x="0" y="30" width="30" height="30" rx="4" fill="url(#grad3D)" stroke="#a78bfa" stroke-width="1.5"/>
      <rect x="30" y="30" width="30" height="30" rx="4" fill="url(#grad3D)" stroke="#a78bfa" stroke-width="1.5"/>
      <rect x="60" y="30" width="30" height="30" rx="4" fill="url(#grad3D)" stroke="#a78bfa" stroke-width="1.5"/>
      <rect x="90" y="30" width="30" height="30" rx="4" fill="url(#grad3D)" stroke="#a78bfa" stroke-width="1.5"/>
      <!-- Row 3 -->
      <rect x="0" y="60" width="30" height="30" rx="4" fill="url(#grad3D)" stroke="#a78bfa" stroke-width="1.5"/>
      <rect x="30" y="60" width="30" height="30" rx="4" fill="url(#grad3D)" stroke="#a78bfa" stroke-width="1.5"/>
      <rect x="60" y="60" width="30" height="30" rx="4" fill="url(#grad3D)" stroke="#a78bfa" stroke-width="1.5"/>
      <rect x="90" y="60" width="30" height="30" rx="4" fill="url(#grad3D)" stroke="#a78bfa" stroke-width="1.5"/>
    </g>
  </g>
</svg>
