<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" width="100%" height="100%">
  <!-- Definitions -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gradAI" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="gradML" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="gradDL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="gradGen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="650" rx="24" fill="url(#bgGrad)" />

  <!-- Grid Pattern overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <rect width="800" height="650" rx="24" fill="url(#grid)" />

  <!-- Circles shifted down -->
  <g transform="translate(400, 360)">
    <!-- AI -->
    <circle cx="0" cy="-20" r="280" fill="url(#gradAI)" stroke="#10b981" stroke-width="2" stroke-dasharray="8 4"/>
    <!-- ML -->
    <circle cx="0" cy="20" r="210" fill="url(#gradML)" stroke="#3b82f6" stroke-width="2" />
    <!-- DL -->
    <circle cx="0" cy="70" r="130" fill="url(#gradDL)" stroke="#8b5cf6" stroke-width="2"/>
    <!-- GenAI -->
    <circle cx="0" cy="120" r="60" fill="url(#gradGen)" stroke="#ec4899" stroke-width="2"/>
  </g>

  <!-- Text -->
  <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
    <!-- AI Text -->
    <text x="400" y="110" font-size="24" font-weight="800" fill="#34d399" letter-spacing="1">ARTIFICIAL INTELLIGENCE (AI)</text>
    <text x="400" y="135" font-size="15" fill="#94a3b8">Any technique enabling computers to act smart</text>

    <!-- ML Text -->
    <text x="400" y="225" font-size="20" font-weight="700" fill="#93c5fd" letter-spacing="1">MACHINE LEARNING (ML)</text>
    <text x="400" y="250" font-size="14" fill="#cbd5e1">Learns patterns from data without explicit rules</text>

    <!-- DL Text -->
    <text x="400" y="345" font-size="18" font-weight="700" fill="#c4b5fd" letter-spacing="0.5">DEEP LEARNING (DL)</text>
    <text x="400" y="365" font-size="13" fill="#e2e8f0">Multi-layer neural networks</text>

    <!-- GenAI Text -->
    <text x="400" y="475" font-size="16" font-weight="700" fill="#fbcfe8">GENERATIVE AI (LLMs)</text>
    <text x="400" y="495" font-size="12" fill="#fce7f3">GPT, BERT, Stable Diffusion</text>
  </g>
</svg>
