<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" rx="16" fill="url(#bgGrad)" />
  <rect width="800" height="450" rx="16" fill="url(#grid)" />

  <text x="400" y="50" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#f8fafc" text-anchor="middle" letter-spacing="1">The Bias-Variance Tradeoff</text>

  <!-- 1. Underfitting -->
  <g transform="translate(50, 120)">
    <rect x="0" y="0" width="200" height="200" fill="#0f172a" stroke="#ef4444" stroke-width="2" rx="8"/>
    <text x="100" y="-15" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#fca5a5" text-anchor="middle">Underfitting</text>
    <text x="100" y="230" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="middle">High Bias, Low Variance</text>
    <text x="100" y="250" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Model is too simple</text>

    <!-- Data points -->
    <circle cx="40" cy="140" r="4" fill="#60a5fa"/>
    <circle cx="70" cy="90" r="4" fill="#60a5fa"/>
    <circle cx="100" cy="110" r="4" fill="#60a5fa"/>
    <circle cx="130" cy="50" r="4" fill="#60a5fa"/>
    <circle cx="160" cy="70" r="4" fill="#60a5fa"/>
    
    <!-- Model Line (Straight line missing the curve) -->
    <path d="M 20 160 L 180 30" fill="none" stroke="#ef4444" stroke-width="3"/>
  </g>

  <!-- 2. Good Fit -->
  <g transform="translate(300, 120)">
    <rect x="0" y="0" width="200" height="200" fill="#0f172a" stroke="#10b981" stroke-width="2" rx="8"/>
    <text x="100" y="-15" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#6ee7b7" text-anchor="middle">Good Fit</text>
    <text x="100" y="230" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">Low Bias, Low Variance</text>
    <text x="100" y="250" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Captures the true pattern</text>

    <!-- Data points -->
    <circle cx="40" cy="140" r="4" fill="#60a5fa"/>
    <circle cx="70" cy="90" r="4" fill="#60a5fa"/>
    <circle cx="100" cy="110" r="4" fill="#60a5fa"/>
    <circle cx="130" cy="50" r="4" fill="#60a5fa"/>
    <circle cx="160" cy="70" r="4" fill="#60a5fa"/>
    
    <!-- Model Line (Gentle curve) -->
    <path d="M 20 160 Q 70 80 100 110 T 180 30" fill="none" stroke="#10b981" stroke-width="3"/>
  </g>

  <!-- 3. Overfitting -->
  <g transform="translate(550, 120)">
    <rect x="0" y="0" width="200" height="200" fill="#0f172a" stroke="#f59e0b" stroke-width="2" rx="8"/>
    <text x="100" y="-15" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#fcd34d" text-anchor="middle">Overfitting</text>
    <text x="100" y="230" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f59e0b" text-anchor="middle">Low Bias, High Variance</text>
    <text x="100" y="250" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Memorizes the noise</text>

    <!-- Data points -->
    <circle cx="40" cy="140" r="4" fill="#60a5fa"/>
    <circle cx="70" cy="90" r="4" fill="#60a5fa"/>
    <circle cx="100" cy="110" r="4" fill="#60a5fa"/>
    <circle cx="130" cy="50" r="4" fill="#60a5fa"/>
    <circle cx="160" cy="70" r="4" fill="#60a5fa"/>
    
    <!-- Model Line (Wiggly line hitting every point) -->
    <path d="M 20 180 Q 40 140 55 120 T 70 90 T 85 130 T 100 110 T 115 40 T 130 50 T 145 90 T 160 70 T 180 60" fill="none" stroke="#f59e0b" stroke-width="3"/>
  </g>
</svg>
