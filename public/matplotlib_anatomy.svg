<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <linearGradient id="figGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" rx="16" fill="url(#bgGrad)" />
  <rect width="800" height="600" rx="16" fill="url(#grid)" />

  <text x="400" y="50" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#f8fafc" text-anchor="middle" letter-spacing="1">Anatomy of a Matplotlib Figure</text>

  <!-- The Figure -->
  <g transform="translate(150, 100)">
    <rect x="0" y="0" width="500" height="400" fill="url(#figGrad)" stroke="#3b82f6" stroke-width="3" rx="8"/>
    <text x="250" y="30" font-family="monospace" font-size="18" font-weight="bold" fill="#93c5fd" text-anchor="middle">Figure (plt.figure)</text>

    <!-- The Axes -->
    <rect x="60" y="80" width="380" height="260" fill="#0f172a" stroke="#10b981" stroke-width="2" rx="4"/>
    <text x="250" y="105" font-family="monospace" font-size="16" font-weight="bold" fill="#6ee7b7" text-anchor="middle">Axes (ax)</text>
    <text x="250" y="130" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Title (ax.set_title)</text>

    <!-- Grid lines -->
    <path d="M 60 180 L 440 180 M 60 230 L 440 230 M 60 280 L 440 280" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>
    <path d="M 155 80 L 155 340 M 250 80 L 250 340 M 345 80 L 345 340" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>
    
    <text x="250" y="210" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Grid (ax.grid)</text>

    <!-- Line Plot -->
    <path d="M 60 300 Q 150 320 200 240 T 350 150 T 440 200" fill="none" stroke="#f472b6" stroke-width="4"/>
    <text x="320" y="140" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f9a8d4">Line (ax.plot)</text>

    <!-- Legend -->
    <rect x="330" y="270" width="90" height="50" fill="#1e293b" stroke="#cbd5e1" stroke-width="1" rx="4"/>
    <text x="375" y="290" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1" text-anchor="middle">Legend</text>
    <path d="M 340 305 L 360 305" fill="none" stroke="#f472b6" stroke-width="3"/>
    <text x="365" y="309" font-family="system-ui, sans-serif" font-size="10" fill="#cbd5e1">Data</text>
    
    <!-- Spines -->
    <path d="M 60 80 L 60 340 L 440 340" fill="none" stroke="#f8fafc" stroke-width="2"/>
    <text x="75" y="325" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Spines</text>

    <!-- X Axis -->
    <text x="250" y="375" font-family="monospace" font-size="14" font-weight="bold" fill="#fcd34d" text-anchor="middle">X-Axis Label (ax.set_xlabel)</text>
    <!-- Y Axis -->
    <g transform="translate(25, 210) rotate(-90)">
      <text x="0" y="0" font-family="monospace" font-size="14" font-weight="bold" fill="#fcd34d" text-anchor="middle">Y-Axis Label</text>
    </g>

    <!-- Ticks -->
    <path d="M 155 340 L 155 348 M 250 340 L 250 348 M 345 340 L 345 348" fill="none" stroke="#f8fafc" stroke-width="2"/>
    <text x="155" y="360" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">1</text>
    <text x="250" y="360" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">2</text>
    <text x="345" y="360" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">3</text>
    <text x="300" y="358" font-family="system-ui, sans-serif" font-size="12" fill="#cbd5e1">Tick Labels</text>

    <path d="M 60 280 L 52 280 M 60 230 L 52 230 M 60 180 L 52 180" fill="none" stroke="#f8fafc" stroke-width="2"/>
  </g>
</svg>
