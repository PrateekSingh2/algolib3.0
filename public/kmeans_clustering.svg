<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="450" rx="16" fill="url(#bgGrad)" />
  <rect width="800" height="450" rx="16" fill="url(#grid)" />

  <text x="400" y="50" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#f8fafc" text-anchor="middle" letter-spacing="1">K-Means Clustering</text>

  <!-- Cluster 1 (Top Left) -->
  <g transform="translate(250, 150)">
    <!-- Data points -->
    <circle cx="-50" cy="-30" r="5" fill="#fca5a5" opacity="0.6"/>
    <circle cx="-20" cy="-60" r="5" fill="#fca5a5" opacity="0.6"/>
    <circle cx="-10" cy="-10" r="5" fill="#fca5a5" opacity="0.6"/>
    <circle cx="-40" cy="10" r="5" fill="#fca5a5" opacity="0.6"/>
    <circle cx="10" cy="-40" r="5" fill="#fca5a5" opacity="0.6"/>
    <circle cx="20" cy="10" r="5" fill="#fca5a5" opacity="0.6"/>
    <circle cx="-30" cy="-20" r="5" fill="#fca5a5" opacity="0.6"/>
    
    <!-- Centroid -->
    <path d="M -15 -35 L -5 -15 L -25 -15 Z" fill="#ef4444" filter="url(#glow)"/>
    <circle cx="-15" cy="-21" r="20" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 4" opacity="0.5"/>
  </g>

  <!-- Cluster 2 (Bottom Left) -->
  <g transform="translate(300, 320)">
    <!-- Data points -->
    <circle cx="-40" cy="-10" r="5" fill="#93c5fd" opacity="0.6"/>
    <circle cx="-10" cy="-30" r="5" fill="#93c5fd" opacity="0.6"/>
    <circle cx="20" cy="-15" r="5" fill="#93c5fd" opacity="0.6"/>
    <circle cx="30" cy="15" r="5" fill="#93c5fd" opacity="0.6"/>
    <circle cx="-20" cy="20" r="5" fill="#93c5fd" opacity="0.6"/>
    <circle cx="0" cy="0" r="5" fill="#93c5fd" opacity="0.6"/>
    <circle cx="15" cy="25" r="5" fill="#93c5fd" opacity="0.6"/>
    
    <!-- Centroid -->
    <rect x="-10" y="-5" width="16" height="16" fill="#3b82f6" filter="url(#glow)"/>
    <circle cx="-2" cy="3" r="25" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 4" opacity="0.5"/>
  </g>

  <!-- Cluster 3 (Middle Right) -->
  <g transform="translate(550, 220)">
    <!-- Data points -->
    <circle cx="-30" cy="-20" r="5" fill="#6ee7b7" opacity="0.6"/>
    <circle cx="-10" cy="-40" r="5" fill="#6ee7b7" opacity="0.6"/>
    <circle cx="20" cy="-30" r="5" fill="#6ee7b7" opacity="0.6"/>
    <circle cx="40" cy="0" r="5" fill="#6ee7b7" opacity="0.6"/>
    <circle cx="10" cy="30" r="5" fill="#6ee7b7" opacity="0.6"/>
    <circle cx="-20" cy="15" r="5" fill="#6ee7b7" opacity="0.6"/>
    <circle cx="5" cy="-5" r="5" fill="#6ee7b7" opacity="0.6"/>
    <circle cx="30" cy="20" r="5" fill="#6ee7b7" opacity="0.6"/>
    
    <!-- Centroid -->
    <polygon points="-5,-15 5,-5 -5,5 -15,-5" fill="#10b981" filter="url(#glow)"/>
    <circle cx="-5" cy="-5" r="30" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="4 4" opacity="0.5"/>
  </g>

  <!-- Annotations -->
  <path d="M 120 180 Q 180 150 200 130" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="110" y="200" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">Centroid 1</text>
  
  <path d="M 160 360 Q 220 330 270 320" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="150" y="380" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">Centroid 2</text>
  
  <path d="M 680 180 Q 640 190 560 210" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="690" y="170" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">Centroid 3</text>

  <!-- Explanation box -->
  <rect x="520" y="340" width="240" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="640" y="365" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">The Goal:</text>
  <text x="640" y="390" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Minimize distance from points</text>
  <text x="640" y="405" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">to their respective centroids</text>
</svg>
