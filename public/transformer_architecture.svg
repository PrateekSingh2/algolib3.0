<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <linearGradient id="encoderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="decoderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#047857;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="attnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="ffnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0284c7;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:0.9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <rect width="900" height="600" rx="16" fill="url(#bgGrad)" />
  <rect width="900" height="600" rx="16" fill="url(#grid)" />

  <text x="450" y="45" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#f8fafc" text-anchor="middle" letter-spacing="1">The Transformer Architecture</text>
  <text x="450" y="65" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Attention is All You Need (The foundation of LLMs)</text>

  <!-- Inputs -->
  <g transform="translate(100, 520)">
    <rect x="0" y="0" width="160" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="2"/>
    <text x="80" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Inputs (Source text)</text>
  </g>
  
  <g transform="translate(540, 520)">
    <rect x="0" y="0" width="160" height="40" rx="4" fill="#334155" stroke="#475569" stroke-width="2"/>
    <text x="80" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Outputs (Shifted right)</text>
  </g>

  <!-- Embeddings -->
  <g transform="translate(100, 450)">
    <rect x="0" y="0" width="160" height="40" rx="4" fill="#1e293b" stroke="#cbd5e1" stroke-width="1"/>
    <text x="80" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#cbd5e1" text-anchor="middle">Input Embedding</text>
  </g>
  <path d="M 180 520 L 180 490" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <g transform="translate(540, 450)">
    <rect x="0" y="0" width="160" height="40" rx="4" fill="#1e293b" stroke="#cbd5e1" stroke-width="1"/>
    <text x="80" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#cbd5e1" text-anchor="middle">Output Embedding</text>
  </g>
  <path d="M 620 520 L 620 490" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Positional Encoding -->
  <g transform="translate(100, 400)">
    <circle cx="20" cy="20" r="12" fill="none" stroke="#f43f5e" stroke-width="2"/>
    <text x="20" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f43f5e" text-anchor="middle">+</text>
    <text x="40" y="25" font-family="system-ui, sans-serif" font-size="12" fill="#fda4af" text-anchor="start">Positional Encoding</text>
  </g>
  <path d="M 180 450 L 180 420" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <g transform="translate(540, 400)">
    <circle cx="20" cy="20" r="12" fill="none" stroke="#f43f5e" stroke-width="2"/>
    <text x="20" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f43f5e" text-anchor="middle">+</text>
    <text x="40" y="25" font-family="system-ui, sans-serif" font-size="12" fill="#fda4af" text-anchor="start">Positional Encoding</text>
  </g>
  <path d="M 620 450 L 620 420" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Encoder Block -->
  <rect x="80" y="150" width="200" height="230" rx="8" fill="url(#encoderGrad)" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5 5"/>
  <text x="80" y="140" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#93c5fd">Encoder (N×)</text>
  <path d="M 180 400 L 180 370" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Encoder Multi-Head Attention -->
  <g transform="translate(100, 310)">
    <rect x="0" y="0" width="160" height="60" rx="4" fill="url(#attnGrad)" stroke="#a78bfa" stroke-width="1"/>
    <text x="80" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ddd6fe" text-anchor="middle">Multi-Head</text>
    <text x="80" y="45" font-family="system-ui, sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">Attention</text>
  </g>
  
  <!-- Add & Norm (Encoder 1) -->
  <g transform="translate(100, 260)">
    <rect x="0" y="0" width="160" height="30" rx="4" fill="#334155" stroke="#94a3b8" stroke-width="1"/>
    <text x="80" y="20" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#f8fafc" text-anchor="middle">Add &amp; Norm</text>
  </g>
  <path d="M 180 310 L 180 290" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Residual connection Encoder 1 -->
  <path d="M 180 380 L 85 380 L 85 275 L 100 275" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Encoder Feed Forward -->
  <g transform="translate(100, 200)">
    <rect x="0" y="0" width="160" height="40" rx="4" fill="url(#ffnGrad)" stroke="#38bdf8" stroke-width="1"/>
    <text x="80" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#bae6fd" text-anchor="middle">Feed Forward</text>
  </g>
  <path d="M 180 260 L 180 240" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Add & Norm (Encoder 2) -->
  <g transform="translate(100, 160)">
    <rect x="0" y="0" width="160" height="30" rx="4" fill="#334155" stroke="#94a3b8" stroke-width="1"/>
    <text x="80" y="20" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#f8fafc" text-anchor="middle">Add &amp; Norm</text>
  </g>
  <path d="M 180 200 L 180 190" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Residual connection Encoder 2 -->
  <path d="M 180 250 L 85 250 L 85 175 L 100 175" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Decoder Block -->
  <rect x="520" y="110" width="200" height="270" rx="8" fill="url(#decoderGrad)" stroke="#10b981" stroke-width="2" stroke-dasharray="5 5"/>
  <text x="520" y="100" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#6ee7b7">Decoder (N×)</text>
  <path d="M 620 400 L 620 380" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Decoder Masked Attention -->
  <g transform="translate(540, 320)">
    <rect x="0" y="0" width="160" height="60" rx="4" fill="url(#attnGrad)" stroke="#a78bfa" stroke-width="1"/>
    <text x="80" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ddd6fe" text-anchor="middle">Masked Multi-Head</text>
    <text x="80" y="45" font-family="system-ui, sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">Attention</text>
  </g>
  
  <!-- Add & Norm (Decoder 1) -->
  <g transform="translate(540, 270)">
    <rect x="0" y="0" width="160" height="30" rx="4" fill="#334155" stroke="#94a3b8" stroke-width="1"/>
    <text x="80" y="20" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#f8fafc" text-anchor="middle">Add &amp; Norm</text>
  </g>
  <path d="M 620 320 L 620 300" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Residual connection Decoder 1 -->
  <path d="M 620 390 L 525 390 L 525 285 L 540 285" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Decoder Cross Attention -->
  <g transform="translate(540, 210)">
    <rect x="0" y="0" width="160" height="40" rx="4" fill="url(#attnGrad)" stroke="#a78bfa" stroke-width="1"/>
    <text x="80" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ddd6fe" text-anchor="middle">Multi-Head Attn</text>
  </g>
  <path d="M 620 270 L 620 250" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Add & Norm (Decoder 2) -->
  <g transform="translate(540, 160)">
    <rect x="0" y="0" width="160" height="30" rx="4" fill="#334155" stroke="#94a3b8" stroke-width="1"/>
    <text x="80" y="20" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#f8fafc" text-anchor="middle">Add &amp; Norm</text>
  </g>
  <path d="M 620 210 L 620 190" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Residual connection Decoder 2 -->
  <path d="M 620 260 L 525 260 L 525 175 L 540 175" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Decoder Feed Forward -->
  <g transform="translate(540, 120)">
    <rect x="0" y="0" width="160" height="30" rx="4" fill="url(#ffnGrad)" stroke="#38bdf8" stroke-width="1"/>
    <text x="80" y="20" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#bae6fd" text-anchor="middle">Feed Forward</text>
  </g>
  <path d="M 620 160 L 620 150" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Output Layer -->
  <g transform="translate(540, 70)">
    <rect x="0" y="0" width="160" height="30" rx="4" fill="#1e293b" stroke="#cbd5e1" stroke-width="1"/>
    <text x="80" y="20" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#cbd5e1" text-anchor="middle">Linear</text>
  </g>
  <path d="M 620 120 L 620 100" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <g transform="translate(540, 20)">
    <rect x="0" y="0" width="160" height="30" rx="4" fill="#3f6212" stroke="#65a30d" stroke-width="1"/>
    <text x="80" y="20" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ecfccb" text-anchor="middle">Softmax</text>
  </g>
  <path d="M 620 70 L 620 50" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <text x="750" y="40" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Output Probabilities</text>

  <!-- Cross Attention Connection (Encoder to Decoder) -->
  <path d="M 280 150 L 390 150 L 390 230 L 540 230" stroke="#38bdf8" stroke-width="3" fill="none" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <text x="410" y="220" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#38bdf8" text-anchor="middle">Keys (K) &amp; Values (V)</text>

  <!-- Attention Mechanism Explainer -->
  <g transform="translate(30, 20)">
    <rect x="0" y="0" width="350" height="110" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="175" y="25" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#a78bfa" text-anchor="middle">Attention Mechanism</text>
    <text x="175" y="45" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">Attention(Q, K, V) = softmax(QKᵀ / √d) V</text>
    <text x="175" y="70" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Q = Query (What am I looking for?)</text>
    <text x="175" y="85" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">K = Key (What do I contain?)</text>
    <text x="175" y="100" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">V = Value (What is my actual content?)</text>
  </g>
</svg>
