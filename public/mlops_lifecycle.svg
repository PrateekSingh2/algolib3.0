<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="trainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#047857;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="deployGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0.9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
    </marker>
  </defs>

  <rect width="900" height="450" rx="16" fill="url(#bgGrad)" />
  <rect width="900" height="450" rx="16" fill="url(#grid)" />

  <text x="450" y="45" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#f8fafc" text-anchor="middle" letter-spacing="1">The MLOps Lifecycle</text>
  <text x="450" y="65" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Continuous Integration, Delivery, and Training (CI/CD/CT)</text>

  <!-- Section 1: Data Engineering -->
  <rect x="50" y="110" width="220" height="250" rx="12" fill="url(#dataGrad)" stroke="#3b82f6" stroke-width="2" opacity="0.9"/>
  <text x="160" y="140" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#bfdbfe" text-anchor="middle">1. Data Engineering</text>

  <rect x="70" y="160" width="180" height="40" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="160" y="185" font-family="system-ui, sans-serif" font-size="14" fill="#f8fafc" text-anchor="middle">Data Ingestion</text>

  <rect x="70" y="210" width="180" height="40" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="160" y="235" font-family="system-ui, sans-serif" font-size="14" fill="#f8fafc" text-anchor="middle">Data Validation</text>

  <rect x="70" y="260" width="180" height="40" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="160" y="285" font-family="system-ui, sans-serif" font-size="14" fill="#f8fafc" text-anchor="middle">Feature Engineering</text>

  <rect x="70" y="310" width="180" height="30" rx="6" fill="#334155" stroke="#94a3b8" stroke-width="1"/>
  <text x="160" y="330" font-family="system-ui, sans-serif" font-size="12" font-style="italic" fill="#cbd5e1" text-anchor="middle">Feature Store</text>

  <path d="M 270 230 L 320 230" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- Section 2: Model Training -->
  <rect x="340" y="110" width="220" height="250" rx="12" fill="url(#trainGrad)" stroke="#10b981" stroke-width="2" opacity="0.9"/>
  <text x="450" y="140" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#a7f3d0" text-anchor="middle">2. Model Training</text>

  <rect x="360" y="160" width="180" height="40" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="450" y="185" font-family="system-ui, sans-serif" font-size="14" fill="#f8fafc" text-anchor="middle">Model Training (CT)</text>

  <rect x="360" y="210" width="180" height="40" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="450" y="235" font-family="system-ui, sans-serif" font-size="14" fill="#f8fafc" text-anchor="middle">Hyperparameter Tuning</text>

  <rect x="360" y="260" width="180" height="40" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="450" y="285" font-family="system-ui, sans-serif" font-size="14" fill="#f8fafc" text-anchor="middle">Model Evaluation</text>

  <rect x="360" y="310" width="180" height="30" rx="6" fill="#334155" stroke="#94a3b8" stroke-width="1"/>
  <text x="450" y="330" font-family="system-ui, sans-serif" font-size="12" font-style="italic" fill="#cbd5e1" text-anchor="middle">Model Registry (MLflow)</text>

  <path d="M 560 230 L 610 230" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- Section 3: Model Deployment -->
  <rect x="630" y="110" width="220" height="250" rx="12" fill="url(#deployGrad)" stroke="#a78bfa" stroke-width="2" opacity="0.9"/>
  <text x="740" y="140" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#ddd6fe" text-anchor="middle">3. Deployment (CI/CD)</text>

  <rect x="650" y="160" width="180" height="40" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="740" y="185" font-family="system-ui, sans-serif" font-size="14" fill="#f8fafc" text-anchor="middle">Model Serving (API)</text>

  <rect x="650" y="210" width="180" height="40" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="740" y="235" font-family="system-ui, sans-serif" font-size="14" fill="#f8fafc" text-anchor="middle">A/B Testing</text>

  <rect x="650" y="260" width="180" height="40" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="740" y="285" font-family="system-ui, sans-serif" font-size="14" fill="#f8fafc" text-anchor="middle">Performance Monitoring</text>

  <!-- Feedback Loop -->
  <path d="M 740 300 L 740 400 L 450 400 L 450 360" stroke="#ef4444" stroke-width="3" stroke-dasharray="5 5" fill="none" marker-end="url(#arrowRed)"/>
  <text x="600" y="390" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="middle">Trigger Retraining (Data Drift)</text>

  <path d="M 450 400 L 160 400 L 160 360" stroke="#ef4444" stroke-width="3" stroke-dasharray="5 5" fill="none" marker-end="url(#arrowRed)"/>
  <text x="300" y="390" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ef4444" text-anchor="middle">Collect New Data</text>

</svg>
