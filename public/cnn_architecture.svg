<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <linearGradient id="convGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0284c7;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="poolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#047857;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="fcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0.9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <rect width="900" height="400" rx="16" fill="url(#bgGrad)" />
  <rect width="900" height="400" rx="16" fill="url(#grid)" />

  <text x="450" y="45" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#f8fafc" text-anchor="middle" letter-spacing="1">Convolutional Neural Network (CNN)</text>
  <text x="450" y="65" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">How computers see and understand images</text>

  <!-- 1. Input Image -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="80" height="80" fill="#334155" stroke="#cbd5e1" stroke-width="2"/>
    <path d="M 10 70 L 30 40 L 50 60 L 60 50 L 75 70" fill="none" stroke="#cbd5e1" stroke-width="3"/>
    <circle cx="20" cy="25" r="8" fill="#cbd5e1"/>
    
    <text x="40" y="105" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Input Image</text>
    <text x="40" y="125" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">224x224x3</text>
  </g>

  <path d="M 140 190 L 165 190" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- 2. Conv Block 1 -->
  <g transform="translate(175, 120)">
    <!-- Feature Maps (Stack of rects) -->
    <rect x="10" y="-10" width="70" height="130" fill="url(#convGrad)" stroke="#38bdf8" stroke-width="1" opacity="0.6"/>
    <rect x="5" y="-5" width="70" height="130" fill="url(#convGrad)" stroke="#38bdf8" stroke-width="1" opacity="0.8"/>
    <rect x="0" y="0" width="70" height="130" fill="url(#convGrad)" stroke="#38bdf8" stroke-width="2"/>
    
    <!-- Filter highlighting -->
    <rect x="10" y="10" width="15" height="15" fill="none" stroke="#fcd34d" stroke-width="2"/>
    
    <text x="35" y="150" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#bae6fd" text-anchor="middle">Conv Layer</text>
    <text x="35" y="170" font-family="system-ui, sans-serif" font-size="12" fill="#7dd3fc" text-anchor="middle">+ ReLU</text>
  </g>

  <path d="M 265 190 L 290 190" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- 3. Pooling 1 -->
  <g transform="translate(300, 135)">
    <rect x="5" y="-5" width="50" height="100" fill="url(#poolGrad)" stroke="#34d399" stroke-width="1" opacity="0.8"/>
    <rect x="0" y="0" width="50" height="100" fill="url(#poolGrad)" stroke="#34d399" stroke-width="2"/>
    
    <text x="25" y="135" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#a7f3d0" text-anchor="middle">Max Pool</text>
    <text x="25" y="155" font-family="system-ui, sans-serif" font-size="12" fill="#6ee7b7" text-anchor="middle">Downsample</text>
  </g>

  <path d="M 365 190 L 390 190" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- 4. Conv Block 2 (Smaller height, more depth) -->
  <g transform="translate(400, 140)">
    <rect x="20" y="-20" width="50" height="80" fill="url(#convGrad)" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
    <rect x="15" y="-15" width="50" height="80" fill="url(#convGrad)" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
    <rect x="10" y="-10" width="50" height="80" fill="url(#convGrad)" stroke="#38bdf8" stroke-width="1" opacity="0.7"/>
    <rect x="5" y="-5" width="50" height="80" fill="url(#convGrad)" stroke="#38bdf8" stroke-width="1" opacity="0.9"/>
    <rect x="0" y="0" width="50" height="80" fill="url(#convGrad)" stroke="#38bdf8" stroke-width="2"/>
    
    <text x="25" y="130" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#bae6fd" text-anchor="middle">Conv + Pool</text>
    <text x="25" y="150" font-family="system-ui, sans-serif" font-size="12" fill="#7dd3fc" text-anchor="middle">Extract features</text>
  </g>

  <path d="M 485 190 L 515 190" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- 5. Flatten -->
  <g transform="translate(530, 90)">
    <rect x="0" y="0" width="15" height="200" fill="#94a3b8" stroke="#cbd5e1" stroke-width="1"/>
    
    <text x="7" y="225" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Flatten</text>
  </g>

  <path d="M 555 190 L 585 190" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- 6. Fully Connected (Dense) -->
  <g transform="translate(600, 70)">
    <circle cx="10" cy="20" r="8" fill="url(#fcGrad)"/>
    <circle cx="10" cy="50" r="8" fill="url(#fcGrad)"/>
    <circle cx="10" cy="80" r="8" fill="url(#fcGrad)"/>
    <circle cx="10" cy="110" r="8" fill="url(#fcGrad)"/>
    <circle cx="10" cy="140" r="8" fill="url(#fcGrad)"/>
    <circle cx="10" cy="170" r="8" fill="url(#fcGrad)"/>
    <circle cx="10" cy="200" r="8" fill="url(#fcGrad)"/>
    <circle cx="10" cy="230" r="8" fill="url(#fcGrad)"/>
    
    <circle cx="70" cy="65" r="8" fill="url(#fcGrad)"/>
    <circle cx="70" cy="105" r="8" fill="url(#fcGrad)"/>
    <circle cx="70" cy="145" r="8" fill="url(#fcGrad)"/>
    <circle cx="70" cy="185" r="8" fill="url(#fcGrad)"/>

    <!-- Connections -->
    <path d="M 18 20 L 62 65" stroke="#475569" stroke-width="1" opacity="0.3"/>
    <path d="M 18 50 L 62 65" stroke="#475569" stroke-width="1" opacity="0.3"/>
    <path d="M 18 80 L 62 105" stroke="#475569" stroke-width="1" opacity="0.3"/>
    <path d="M 18 110 L 62 105" stroke="#475569" stroke-width="1" opacity="0.3"/>
    <path d="M 18 140 L 62 145" stroke="#475569" stroke-width="1" opacity="0.3"/>
    <path d="M 18 170 L 62 145" stroke="#475569" stroke-width="1" opacity="0.3"/>
    <path d="M 18 200 L 62 185" stroke="#475569" stroke-width="1" opacity="0.3"/>
    <path d="M 18 230 L 62 185" stroke="#475569" stroke-width="1" opacity="0.3"/>
    
    <text x="40" y="260" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ddd6fe" text-anchor="middle">Dense Layers</text>
    <text x="40" y="280" font-family="system-ui, sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">Classification</text>
  </g>

  <path d="M 685 190 L 715 190" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- 7. Output -->
  <g transform="translate(730, 150)">
    <rect x="0" y="0" width="100" height="30" rx="4" fill="#16a34a" opacity="0.8"/>
    <text x="50" y="20" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Dog (85%)</text>
    
    <rect x="0" y="40" width="100" height="30" rx="4" fill="#334155" opacity="0.8"/>
    <text x="50" y="60" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Cat (10%)</text>
    
    <rect x="0" y="80" width="100" height="30" rx="4" fill="#334155" opacity="0.8"/>
    <text x="50" y="100" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Bird (5%)</text>
    
    <text x="50" y="145" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Softmax Output</text>
  </g>

</svg>
