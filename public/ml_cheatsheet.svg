<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="900" height="600" rx="16" fill="url(#bgGrad)" />
  <rect width="900" height="600" rx="16" fill="url(#grid)" />

  <text x="450" y="50" font-family="system-ui, sans-serif" font-size="28" font-weight="900" fill="#f8fafc" text-anchor="middle" letter-spacing="2">MACHINE LEARNING MAP</text>
  <text x="450" y="75" font-family="system-ui, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Which algorithm should you use?</text>

  <!-- Start Point -->
  <circle cx="450" cy="120" r="15" fill="#3b82f6"/>
  <text x="450" y="125" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">START</text>

  <!-- Supervised vs Unsupervised Split -->
  <path d="M 450 135 L 450 160" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M 250 160 L 650 160" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M 250 160 L 250 190" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M 650 160 L 650 190" stroke="#64748b" stroke-width="3" fill="none"/>

  <rect x="175" y="170" width="150" height="20" fill="#0f172a"/>
  <text x="250" y="185" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Do you have labels?</text>

  <rect x="575" y="170" width="150" height="20" fill="#0f172a"/>
  <text x="650" y="185" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">No labels (Discover)</text>

  <!-- Supervised Side -->
  <rect x="150" y="200" width="200" height="50" rx="8" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="250" y="230" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#bfdbfe" text-anchor="middle">Supervised Learning</text>

  <path d="M 250 250 L 250 280" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M 125 280 L 375 280" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M 125 280 L 125 310" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M 375 280 L 375 310" stroke="#64748b" stroke-width="3" fill="none"/>

  <text x="125" y="300" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">Predicting a Category?</text>
  <text x="375" y="300" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">Predicting a Number?</text>

  <!-- Classification -->
  <rect x="50" y="320" width="150" height="40" rx="6" fill="#4c1d95" stroke="#8b5cf6" stroke-width="2"/>
  <text x="125" y="345" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ddd6fe" text-anchor="middle">Classification</text>
  
  <rect x="30" y="375" width="190" height="90" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="125" y="400" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">Random Forest</text>
  <text x="125" y="420" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">XGBoost</text>
  <text x="125" y="440" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Logistic Regression</text>

  <!-- Regression -->
  <rect x="300" y="320" width="150" height="40" rx="6" fill="#4c1d95" stroke="#8b5cf6" stroke-width="2"/>
  <text x="375" y="345" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ddd6fe" text-anchor="middle">Regression</text>

  <rect x="280" y="375" width="190" height="90" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="375" y="400" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">XGBoost Regressor</text>
  <text x="375" y="420" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Linear Regression</text>
  <text x="375" y="440" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Ridge / Lasso</text>


  <!-- Unsupervised Side -->
  <rect x="550" y="200" width="200" height="50" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="650" y="230" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#a7f3d0" text-anchor="middle">Unsupervised Learning</text>

  <path d="M 650 250 L 650 280" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M 525 280 L 775 280" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M 525 280 L 525 310" stroke="#64748b" stroke-width="3" fill="none"/>
  <path d="M 775 280 L 775 310" stroke="#64748b" stroke-width="3" fill="none"/>

  <text x="525" y="300" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">Finding Groups?</text>
  <text x="775" y="300" font-family="system-ui, sans-serif" font-size="14" fill="#cbd5e1" text-anchor="middle">Reducing Features?</text>

  <!-- Clustering -->
  <rect x="450" y="320" width="150" height="40" rx="6" fill="#9d174d" stroke="#f43f5e" stroke-width="2"/>
  <text x="525" y="345" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#fecdd3" text-anchor="middle">Clustering</text>

  <rect x="430" y="375" width="190" height="90" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="525" y="400" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">K-Means</text>
  <text x="525" y="420" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">DBSCAN (Outliers)</text>
  <text x="525" y="440" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Hierarchical</text>

  <!-- Dimensionality Reduction -->
  <rect x="700" y="320" width="150" height="40" rx="6" fill="#9d174d" stroke="#f43f5e" stroke-width="2"/>
  <text x="775" y="345" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#fecdd3" text-anchor="middle">Dim Reduction</text>

  <rect x="680" y="375" width="190" height="90" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="775" y="400" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">PCA (Fast, General)</text>
  <text x="775" y="420" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">UMAP (Best overall)</text>
  <text x="775" y="440" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">t-SNE (Visual only)</text>

  <!-- Deep Learning Callout (Bottom Center) -->
  <path d="M 450 300 L 450 490" stroke="#64748b" stroke-width="2" stroke-dasharray="5 5" fill="none"/>
  
  <rect x="250" y="500" width="400" height="80" rx="8" fill="#1e293b" stroke="#eab308" stroke-width="2"/>
  <text x="450" y="530" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#fef08a" text-anchor="middle">Working with Images or Text?</text>
  <text x="450" y="550" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Use Deep Learning: CNNs, Transformers, LLMs</text>
  <text x="450" y="565" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">(Don't use traditional ML algorithms for raw pixels/words)</text>

</svg>
