<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="boxBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="boxGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#047857;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="boxPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c1d95;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="boxPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#831843;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#be185d;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="boxOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c2d12;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#c2410c;stop-opacity:0.9"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>

  <rect width="800" height="400" rx="16" fill="url(#bgGrad)" />
  <rect width="800" height="400" rx="16" fill="url(#grid)" />

  <text x="400" y="45" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#f8fafc" text-anchor="middle" letter-spacing="1">The Machine Learning Data Pipeline</text>
  <text x="400" y="65" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">70-80% of an ML Engineer's job happens here</text>

  <!-- Flowchart Elements -->
  <g transform="translate(40, 150)">
    
    <!-- 1. Raw Data -->
    <rect x="0" y="0" width="120" height="80" rx="8" fill="url(#boxBlue)" stroke="#60a5fa" stroke-width="2"/>
    <text x="60" y="35" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#bfdbfe" text-anchor="middle">Raw Data</text>
    <text x="60" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#93c5fd" text-anchor="middle">Messy, missing values</text>

    <!-- Arrow -->
    <path d="M 120 40 L 150 40" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

    <!-- 2. Cleaning -->
    <rect x="155" y="0" width="120" height="80" rx="8" fill="url(#boxGreen)" stroke="#34d399" stroke-width="2"/>
    <text x="215" y="35" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#a7f3d0" text-anchor="middle">Data Cleaning</text>
    <text x="215" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#6ee7b7" text-anchor="middle">Impute NaNs, Drop</text>
    
    <!-- Arrow -->
    <path d="M 275 40 L 305 40" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

    <!-- 3. Encoding -->
    <rect x="310" y="0" width="120" height="80" rx="8" fill="url(#boxPurple)" stroke="#a78bfa" stroke-width="2"/>
    <text x="370" y="35" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ddd6fe" text-anchor="middle">Encoding</text>
    <text x="370" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">Text → Numbers</text>
    
    <!-- Arrow -->
    <path d="M 430 40 L 460 40" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

    <!-- 4. Scaling -->
    <rect x="465" y="0" width="120" height="80" rx="8" fill="url(#boxPink)" stroke="#f472b6" stroke-width="2"/>
    <text x="525" y="35" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#fbcfe8" text-anchor="middle">Scaling</text>
    <text x="525" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#f9a8d4" text-anchor="middle">Normalize ranges</text>
    
    <!-- Arrow -->
    <path d="M 585 40 L 615 40" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

    <!-- 5. Train/Test Split -->
    <rect x="620" y="0" width="120" height="80" rx="8" fill="url(#boxOrange)" stroke="#fb923c" stroke-width="2"/>
    <text x="680" y="35" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#fed7aa" text-anchor="middle">Train/Test Split</text>
    <text x="680" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#fdba74" text-anchor="middle">80% Train, 20% Test</text>
  </g>

  <!-- Output labels -->
  <path d="M 700 240 L 700 260 L 630 260" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 700 240 L 700 260 L 770 260" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <rect x="580" y="270" width="90" height="40" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="625" y="295" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Train Set</text>
  
  <rect x="730" y="270" width="90" height="40" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="775" y="295" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#f8fafc" text-anchor="middle">Test Set</text>

  <!-- Bracket for Preprocessing -->
  <path d="M 195 240 L 195 260 L 525 260 L 525 240" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="5 5"/>
  <text x="360" y="285" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#94a3b8" text-anchor="middle">Scikit-Learn Pipeline</text>
  <text x="360" y="305" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">fit() on train, transform() on both</text>
</svg>
